<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Site Temporarily Unavailable</title>
      <style>
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
          }

          body {
              font-family: monospace;
              background: #3c3836;
              min-height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
              padding: 20px;
          }

          .container {
              background: white;
              border: 2px solid black;
              padding: 60px 40px;
              max-width: 600px;
              box-shadow: 8px 8px 0 0 black;
              text-align: center;
          }

          h1 {
              font-size: 28px;
              color: #1a1a1a;
              margin-bottom: 24px;
              font-weight: 700;
              line-height: 1.3;
          }

          p {
              font-size: 18px;
              color: #4a4a4a;
              line-height: 1.6;
          }

          .apology {
              margin-top: 20px;
              font-size: 16px;
              color: #6a6a6a;
              font-style: italic;
          }

          @media (max-width: 640px) {
              .container {
                  padding: 40px 24px;
                  box-shadow: 6px 6px 0 0 black;
              }

              h1 {
                  font-size: 24px;
              }

              p {
                  font-size: 16px;
              }

              .apology {
                  font-size: 14px;
              }
          }
      </style>
  </head>
  <body>
      <div class="container">
          <h1>If you are here you have reached one of the many ends of the internet. Congratulations. Go touch grass.</h1>
      </div>
  </body>
  </html>
